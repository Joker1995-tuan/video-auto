<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PRO CLOUD</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100 p-8">

<div id="authSection" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl">
<h2 class="text-2xl font-bold mb-6">🔐 Đăng nhập SUPER PRO</h2>

<input id="email" placeholder="Email" class="w-full border p-3 rounded-lg mb-4">
<input id="password" type="password" placeholder="Mật khẩu" class="w-full border p-3 rounded-lg mb-4">

<button onclick="login()" class="w-full bg-black text-white p-3 rounded-lg mb-2">Đăng nhập</button>
<button onclick="register()" class="w-full bg-gray-800 text-white p-3 rounded-lg">Tạo tài khoản</button>
</div>

<div id="appSection" style="display:none" class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl p-10">

<h1 class="text-3xl font-bold mb-6">🔥 SUPER PRO CLOUD</h1>

<button onclick="logout()" class="mb-6 bg-red-500 text-white px-4 py-2 rounded">Đăng xuất</button>

<div class="grid md:grid-cols-2 gap-6">

<div>
<label>Tên sản phẩm</label>
<input id="name" class="w-full border p-3 rounded mt-1">
</div>

<div>
<label>Giá bán</label>
<input id="price" type="number" class="w-full border p-3 rounded mt-1">
</div>

</div>

<button onclick="saveProduct()" class="mt-6 bg-black text-white px-6 py-3 rounded-lg">
Lưu sản phẩm Cloud
</button>

<hr class="my-8">

<h2 class="text-xl font-bold mb-4">📂 Lịch sử sản phẩm</h2>
<div id="productList"></div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyALcfPUIDPwXGbXCyPBEkjGhz0xc0rYD_Y",
  authDomain: "super-pro-cloud.firebaseapp.com",
  projectId: "super-pro-cloud",
  storageBucket: "super-pro-cloud.firebasestorage.app",
  messagingSenderId: "716437022444",
  appId: "1:716437022444:web:d5d8c92ede37a52e6527c9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;

// AUTH STATE
auth.onAuthStateChanged(user => {
if(user){
currentUser = user;
document.getElementById("authSection").style.display="none";
document.getElementById("appSection").style.display="block";
loadProducts();
}else{
document.getElementById("authSection").style.display="block";
document.getElementById("appSection").style.display="none";
}
});

// REGISTER
function register(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert("Tạo tài khoản thành công"))
.catch(err=>alert(err.message));
}

// LOGIN
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
auth.signInWithEmailAndPassword(email,pass)
.catch(err=>alert(err.message));
}

// LOGOUT
function logout(){
auth.signOut();
}

// SAVE PRODUCT
function saveProduct(){
let name=document.getElementById("name").value;
let price=parseFloat(document.getElementById("price").value);

db.collection("products").add({
uid: currentUser.uid,
name,
price,
createdAt: new Date()
}).then(()=>{
alert("Đã lưu cloud");
loadProducts();
});
}

// LOAD PRODUCTS
function loadProducts(){
db.collection("products")
.where("uid","==",currentUser.uid)
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let d=doc.data();
html+=`
<div class="border p-4 rounded mb-2">
<b>${d.name}</b><br>
Giá: ${d.price.toLocaleString()}đ
</div>`;
});
document.getElementById("productList").innerHTML=html;
});
}

</script>

</body>
</html>
