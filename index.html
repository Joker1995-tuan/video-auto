<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PRO SELLER CENTER v2</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">

<h1 class="text-2xl font-bold mb-6">
🚀 SUPER PRO SELLER CENTER v2
</h1>

<div id="app"></div>

</div>

<script>

// ================= FIREBASE CONFIG =================

const firebaseConfig = {
  apiKey: "AIzaSyCwZMWbmobqHkjbmCKnqpqm-NUjZNe_Ru8",
  authDomain: "super-pro-seller-v3.firebaseapp.com",
  projectId: "super-pro-seller-v3",
  storageBucket: "super-pro-seller-v3.firebasestorage.app",
  messagingSenderId: "648387756445",
  appId: "1:648387756445:web:c8fc9236b327112e80ef74"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// ================= LOGIN =================

auth.signInAnonymously();

auth.onAuthStateChanged(user => {
if(user){
currentUser = user;
renderDashboard();
}
});

// ================= DASHBOARD =================

function renderDashboard(){
document.getElementById("app").innerHTML = `
<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="bg-gray-100 p-4 rounded-xl">
<div class="text-sm text-gray-500">Doanh thu tháng</div>
<div id="totalRevenue" class="text-xl font-bold">0đ</div>
</div>

<div class="bg-gray-100 p-4 rounded-xl">
<div class="text-sm text-gray-500">Lợi nhuận tháng</div>
<div id="totalProfit" class="text-xl font-bold">0đ</div>
</div>

<div class="bg-gray-100 p-4 rounded-xl">
<div class="text-sm text-gray-500">Tổng đơn</div>
<div id="totalOrders" class="text-xl font-bold">0</div>
</div>

<div class="bg-gray-100 p-4 rounded-xl">
<div class="text-sm text-gray-500">ROAS TB</div>
<div id="avgRoas" class="text-xl font-bold">0</div>
</div>

</div>

<canvas id="revenueChart" height="100"></canvas>

<hr class="my-6">

<h2 class="font-bold mb-3">➕ Thêm dữ liệu ngày</h2>

<div class="grid md:grid-cols-4 gap-4">
<input type="date" id="date" class="border p-2 rounded">
<input type="number" id="revenue" placeholder="Doanh thu" class="border p-2 rounded">
<input type="number" id="profit" placeholder="Lợi nhuận" class="border p-2 rounded">
<input type="number" id="orders" placeholder="Số đơn" class="border p-2 rounded">
</div>

<button onclick="saveDay()" 
class="mt-4 bg-black text-white px-6 py-2 rounded">
Lưu ngày
</button>

<hr class="my-6">

<div id="history"></div>
`;

loadData();
}

// ================= SAVE DATA =================

function saveDay(){
db.collection("users")
.doc(currentUser.uid)
.collection("reports")
.add({
date: document.getElementById("date").value,
revenue: Number(document.getElementById("revenue").value),
profit: Number(document.getElementById("profit").value),
orders: Number(document.getElementById("orders").value),
createdAt: new Date()
});
}

// ================= LOAD DATA =================

function loadData(){

db.collection("users")
.doc(currentUser.uid)
.collection("reports")
.orderBy("createdAt")
.onSnapshot(snapshot => {

let totalRevenue = 0;
let totalProfit = 0;
let totalOrders = 0;

let labels = [];
let revenues = [];

let html = "";

snapshot.forEach(doc => {
let d = doc.data();

totalRevenue += d.revenue;
totalProfit += d.profit;
totalOrders += d.orders;

labels.push(d.date);
revenues.push(d.revenue);

html += `
<div class="border p-3 rounded mb-2">
${d.date} | ${d.revenue.toLocaleString()}đ | ${d.profit.toLocaleString()}đ | ${d.orders} đơn
</div>
`;
});

document.getElementById("totalRevenue").innerText = totalRevenue.toLocaleString()+"đ";
document.getElementById("totalProfit").innerText = totalProfit.toLocaleString()+"đ";
document.getElementById("totalOrders").innerText = totalOrders;

let avgRoas = totalProfit>0 ? (totalRevenue/totalProfit).toFixed(2) : 0;
document.getElementById("avgRoas").innerText = avgRoas;

document.getElementById("history").innerHTML = html;

drawChart(labels, revenues);

});
}

// ================= CHART =================

let chart;

function drawChart(labels, data){
const ctx = document.getElementById("revenueChart");

if(chart){
chart.destroy();
}

chart = new Chart(ctx, {
type: "line",
data: {
labels: labels,
datasets: [{
label: "Doanh thu",
data: data,
borderWidth: 2
}]
}
});
}

</script>

</body>
</html>
