<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PRO 4.0</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">

<h1 class="text-2xl font-bold mb-6">🔥 SUPER PRO 4.0</h1>

<div class="flex gap-4 mb-6">
<button onclick="showTab('video')" class="bg-black text-white px-4 py-2 rounded">🎬 Video & ROAS</button>
<button onclick="showTab('salary')" class="bg-gray-800 text-white px-4 py-2 rounded">📊 Lương & Doanh Thu</button>
</div>

<!-- ================= VIDEO TOOL ================= -->
<div id="videoTab">

<div class="grid md:grid-cols-2 gap-4">
<input id="name" placeholder="Tên sản phẩm" class="border p-3 rounded-lg">
<input id="size" placeholder="Kích thước" class="border p-3 rounded-lg">
<input id="price" placeholder="Giá bán" class="border p-3 rounded-lg">
<input id="cost" placeholder="Giá xưởng" class="border p-3 rounded-lg">
<input id="concept" placeholder="Concept" class="border p-3 rounded-lg">
<input id="room" placeholder="Phòng sử dụng" class="border p-3 rounded-lg">
<input id="target" placeholder="Tệp khách" class="border p-3 rounded-lg">
<input id="ads" placeholder="Ngân sách ads" class="border p-3 rounded-lg">

<select id="style" class="border p-3 rounded-lg col-span-2">
<option value="luxury">Luxury</option>
<option value="viral">Viral</option>
<option value="emotional">Emotional</option>
</select>
</div>

<button onclick="generateVideo()" class="mt-4 bg-black text-white px-6 py-3 rounded-xl">
Tạo Nội Dung
</button>

<div class="mt-6 space-y-4">
<textarea id="imagePrompt" class="w-full h-24 border p-3 rounded"></textarea>
<textarea id="videoPrompt" class="w-full h-32 border p-3 rounded"></textarea>
<textarea id="caption" class="w-full h-24 border p-3 rounded"></textarea>
<div id="profitBox" class="bg-gray-100 p-4 rounded"></div>
</div>

</div>

<!-- ================= SALARY DASHBOARD ================= -->
<div id="salaryTab" style="display:none">

<div class="grid md:grid-cols-3 gap-4">
<input type="date" id="date">
<input type="number" id="revenue" placeholder="Doanh thu hôm nay">
<input type="number" id="orders" placeholder="Số đơn hôm nay">
</div>

<button onclick="saveDay()" class="mt-4 bg-black text-white px-6 py-3 rounded-xl">
Lưu Ngày
</button>

<hr class="my-6">

<div id="dashboard" class="bg-gray-100 p-4 rounded"></div>

<div class="w-full bg-gray-200 rounded-full h-6 mt-4">
<div id="progressBar" class="bg-green-500 h-6 rounded-full text-center text-white text-sm"></div>
</div>

<table class="w-full mt-6 border text-center">
<thead class="bg-gray-200">
<tr>
<th class="p-2 border">Ngày</th>
<th class="p-2 border">Doanh Thu</th>
<th class="p-2 border">Đơn</th>
<th class="p-2 border">Xóa</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

</div>

</div>

<script>

function showTab(tab){
document.getElementById("videoTab").style.display = tab==="video" ? "block" : "none";
document.getElementById("salaryTab").style.display = tab==="salary" ? "block" : "none";
}

function formatMoney(num){
return Number(num).toLocaleString("vi-VN")+"đ";
}

function generateVideo(){
let name=document.getElementById("name").value;
let size=document.getElementById("size").value;
let price=parseFloat(document.getElementById("price").value||0);
let cost=parseFloat(document.getElementById("cost").value||0);
let ads=parseFloat(document.getElementById("ads").value||0);
let concept=document.getElementById("concept").value;
let room=document.getElementById("room").value;
let target=document.getElementById("target").value;
let style=document.getElementById("style").value;

document.getElementById("imagePrompt").value=
`Luxury ${room} interior, 5D painting "${name}", cinematic lighting, 4K`;

document.getElementById("videoPrompt").value=
`15s ${style} product video of "${name}" in ${room}, cinematic 4K`;

document.getElementById("caption").value=
`${name} - ${size}
Phong cách ${concept}
Giá ${formatMoney(price)}
Phù hợp ${target}`;

let fee=price*0.3;
let profit=price-fee-cost-ads;
let roas=ads>0?price/ads:0;

document.getElementById("profitBox").innerHTML=
`Phí 30%: ${formatMoney(fee)}<br>
Lợi nhuận: <b>${formatMoney(profit)}</b><br>
ROAS hòa vốn: ${roas.toFixed(2)}`;
}

/* ===== SALARY SYSTEM ===== */

let data=JSON.parse(localStorage.getItem("salesData"))||[];

function saveDay(){
let date=document.getElementById("date").value;
let revenue=parseFloat(document.getElementById("revenue").value||0);
let orders=parseInt(document.getElementById("orders").value||0);
if(!date)return alert("Chọn ngày");
data.push({date,revenue,orders});
localStorage.setItem("salesData",JSON.stringify(data));
render();
}

function deleteDay(i){
data.splice(i,1);
localStorage.setItem("salesData",JSON.stringify(data));
render();
}

function render(){
let totalRevenue=0,totalOrders=0;
data.forEach(d=>{totalRevenue+=d.revenue;totalOrders+=d.orders;});

let base=6000000;
let lunch=25_000*26;
let fuel=600000;
let attendance=500000;
let orderBonus=totalOrders*5000;
let revenueBonus=totalRevenue>=100_000_000?totalRevenue*0.05:0;

let totalIncome=base+lunch+fuel+attendance+orderBonus+revenueBonus;

document.getElementById("dashboard").innerHTML=
`Tổng doanh thu: <b>${formatMoney(totalRevenue)}</b><br>
Tổng đơn: <b>${totalOrders}</b><br>
5k/đơn: <b>${formatMoney(orderBonus)}</b><br>
Thưởng 5%: <b>${formatMoney(revenueBonus)}</b><br>
<hr>
👉 Thu nhập tạm tính: <b class="text-green-600">${formatMoney(totalIncome)}</b>`;

let percent=(totalRevenue/100_000_000)*100;
percent=percent>100?100:percent;
document.getElementById("progressBar").style.width=percent+"%";
document.getElementById("progressBar").innerText=percent.toFixed(1)+"%";

let html="";
data.forEach((d,i)=>{
html+=`<tr>
<td class="border p-2">${d.date}</td>
<td class="border p-2">${formatMoney(d.revenue)}</td>
<td class="border p-2">${d.orders}</td>
<td class="border p-2"><button onclick="deleteDay(${i})" class="bg-red-500 text-white px-2 py-1 rounded">X</button></td>
</tr>`;
});
document.getElementById("history").innerHTML=html;
}

render();

</script>

</body>
</html>
