<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Doanh Thu Nhân Viên Sàn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">

<h1 class="text-2xl font-bold mb-6">🔥 Dashboard Lương & Doanh Thu</h1>

<!-- NHẬP DỮ LIỆU NGÀY -->
<div class="grid md:grid-cols-3 gap-4">
<input type="date" id="date" class="border p-3 rounded-lg">
<input type="number" id="revenue" placeholder="Doanh thu hôm nay" class="border p-3 rounded-lg">
<input type="number" id="orders" placeholder="Số đơn hôm nay" class="border p-3 rounded-lg">
</div>

<button onclick="saveDay()" class="mt-4 bg-black text-white px-6 py-3 rounded-xl">
Lưu Ngày
</button>

<hr class="my-8">

<h2 class="text-xl font-bold mb-4">📊 Tổng Quan Tháng</h2>
<div id="dashboard" class="bg-gray-100 p-6 rounded-lg space-y-2"></div>

<div class="mt-6">
<h2 class="font-bold mb-2">🎯 Tiến Trình 100 Triệu</h2>
<div class="w-full bg-gray-200 rounded-full h-6">
<div id="progressBar" class="bg-green-500 h-6 rounded-full text-center text-white text-sm"></div>
</div>
</div>

<hr class="my-8">

<h2 class="text-xl font-bold mb-4">📅 Lịch Sử Nhập</h2>
<table class="w-full border text-center">
<thead class="bg-gray-200">
<tr>
<th class="p-2 border">Ngày</th>
<th class="p-2 border">Doanh Thu</th>
<th class="p-2 border">Đơn</th>
<th class="p-2 border">Xóa</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("salesData")) || [];

function formatMoney(num){
return Number(num).toLocaleString("vi-VN") + "đ";
}

function saveDay(){
let date = document.getElementById("date").value;
let revenue = parseFloat(document.getElementById("revenue").value || 0);
let orders = parseInt(document.getElementById("orders").value || 0);

if(!date) return alert("Chọn ngày");

data.push({date, revenue, orders});
localStorage.setItem("salesData", JSON.stringify(data));

render();
}

function deleteDay(index){
data.splice(index,1);
localStorage.setItem("salesData", JSON.stringify(data));
render();
}

function render(){

let totalRevenue = 0;
let totalOrders = 0;

data.forEach(d=>{
totalRevenue += d.revenue;
totalOrders += d.orders;
});

let baseSalary = 6000000;
let lunch = 25_000 * 26;
let fuel = 600000;
let attendance = 500000;
let orderBonus = totalOrders * 5000;
let revenueBonus = totalRevenue >= 100_000_000 ? totalRevenue * 0.05 : 0;

let totalIncome = baseSalary + lunch + fuel + attendance + orderBonus + revenueBonus;

let avgOrder = totalOrders > 0 ? totalRevenue / totalOrders : 0;

document.getElementById("dashboard").innerHTML = `
Tổng doanh thu: <b>${formatMoney(totalRevenue)}</b><br>
Tổng đơn: <b>${totalOrders}</b><br>
Trung bình/đơn: <b>${formatMoney(avgOrder)}</b><br>
Tiền 5k/đơn: <b>${formatMoney(orderBonus)}</b><br>
Thưởng 5%: <b>${formatMoney(revenueBonus)}</b><br>
<hr>
👉 Thu nhập tạm tính: <b class="text-green-600 text-lg">${formatMoney(totalIncome)}</b>
`;

let percent = (totalRevenue / 100_000_000) * 100;
percent = percent > 100 ? 100 : percent;

document.getElementById("progressBar").style.width = percent + "%";
document.getElementById("progressBar").innerText = percent.toFixed(1) + "%";

let historyHTML = "";
data.forEach((d,index)=>{
historyHTML += `
<tr>
<td class="border p-2">${d.date}</td>
<td class="border p-2">${formatMoney(d.revenue)}</td>
<td class="border p-2">${d.orders}</td>
<td class="border p-2">
<button onclick="deleteDay(${index})" class="bg-red-500 text-white px-3 py-1 rounded">X</button>
</td>
</tr>
`;
});

document.getElementById("history").innerHTML = historyHTML;
}

render();

</script>

</body>
</html>
